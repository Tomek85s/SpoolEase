name: Build SpoolEase
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Instalujemy niezbędne biblioteki systemowe, w tym libudev-dev
          sudo apt-get install -y libclang-dev cmake gcc-riscv64-unknown-elf libssl-dev pkg-config libuv1-dev libudev-dev

      - name: Setup ESP Rust
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true

      - name: Build and Merge Binary
        working-directory: ./core
        run: |
          # Naprawiamy wielkość liter w nazwie pliku
          if [ -f "cargo.toml" ]; then mv cargo.toml Cargo.toml; fi
          
          # Usuwamy kłopotliwy plik toolchaina autora
          rm -f rust-toolchain.toml
          
          # Instalujemy narzędzie do tworzenia gotowych obrazów .bin
          cargo install espflash --no-default-features --features cli --version 2.1.0
          
          # Generujemy scalony plik merged.bin (zawiera bootloader i kod)
          cargo espflash save-image --release --target xtensa-esp32s3-none-elf ../merged.bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpoolEase-Final-PL
          path: merged.bin
