name: Build SpoolEase
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev cmake gcc-riscv64-unknown-elf libssl-dev pkg-config libuv1-dev

      - name: Setup ESP Rust
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true

      - name: Build Firmware
        working-directory: ./core
        run: |
          # Rozwiązujemy problem wielkości liter w nazwie pliku cargo.toml
          if [ -f "cargo.toml" ]; then mv cargo.toml Cargo.toml; fi
          
          # Usuwamy plik konfiguracyjny autora, który blokuje serwer
          rm -f rust-toolchain.toml
          
          # Budujemy firmware dla ESP32-S3
          cargo build --release --target xtensa-esp32s3-none-elf

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spool-ease-bin
          path: core/target/xtensa-esp32s3-none-elf/release/
