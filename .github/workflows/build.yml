name: Build SpoolEase
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Instalacja niezbędnych bibliotek, w tym libudev-dev dla espflash
          sudo apt-get install -y libclang-dev cmake gcc-riscv64-unknown-elf libssl-dev pkg-config libuv1-dev libudev-dev

      - name: Setup ESP Rust
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true

      - name: Build and Merge Binary
        working-directory: ./core
        run: |
          # Rozwiązanie problemu wielkości liter w nazwie pliku
          if [ -f "cargo.toml" ]; then mv cargo.toml Cargo.toml; fi
          
          # Usunięcie blokady toolchaina 'esp'
          rm -f rust-toolchain.toml
          
          # Instalacja narzędzia do generowania obrazu binarnego
          cargo install espflash --no-default-features --features cli --version 2.1.0
          
          # Użycie pełnej ścieżki do espflash, aby uniknąć błędów sesji
          /home/runner/.cargo/bin/espflash save-image --release --target xtensa-esp32s3-none-elf ../merged.bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpoolEase-Final-PL
          path: merged.bin
